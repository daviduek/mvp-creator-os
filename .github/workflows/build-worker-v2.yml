name: Build & Push Worker v2 (official base + LoRA)

on:
  push:
    branches: [main]
    paths:
      - 'worker-v2/**'
      - '.github/workflows/build-worker-v2.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          df -h /

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push v2
        uses: docker/build-push-action@v6
        with:
          context: ./worker-v2
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mvp-creator-worker-v2:latest
            ghcr.io/${{ github.repository_owner }}/mvp-creator-worker-v2:${{ github.sha }}
          cache-from: type=gha,scope=v2
          cache-to: type=gha,mode=max,scope=v2
          secrets: |
            civitai_token=${{ secrets.CIVITAI_TOKEN }}
