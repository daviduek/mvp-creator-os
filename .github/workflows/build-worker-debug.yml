name: Build & Push Worker Debug

on:
  push:
    branches: [main]
    paths:
      - 'worker-debug/**'
      - '.github/workflows/build-worker-debug.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./worker-debug
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mvp-creator-worker-debug:latest
            ghcr.io/${{ github.repository_owner }}/mvp-creator-worker-debug:${{ github.sha }}
